<script>
  // ---- localStorage-backed storage shim (mimics window.storage API used by the app) ----
  window.storage = {
    async get(key, shared) {
      try {
        const raw = localStorage.getItem("growthify_" + key);
        if (raw === null) return null;
        return { key, value: raw, shared: !!shared };
      } catch (e) {
        return null;
      }
    },
    async set(key, value, shared) {
      try {
        localStorage.setItem("growthify_" + key, value);
        return { key, value, shared: !!shared };
      } catch (e) {
        return null;
      }
    },
    async delete(key, shared) {
      try {
        localStorage.removeItem("growthify_" + key);
        return { key, deleted: true, shared: !!shared };
      } catch (e) {
        return null;
      }
    },
    async list(prefix, shared) {
      try {
        const keys = Object.keys(localStorage)
          .filter(k => k.startsWith("growthify_" + (prefix || "")))
          .map(k => k.replace("growthify_", ""));
        return { keys, prefix, shared: !!shared };
      } catch (e) {
        return null;
      }
    }
  };
</script>

function useStore(key, initial, seedFn) {
  const [data, setData] = useState(initial);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(key, false);
        if (res && res.value) {
          setData(JSON.parse(res.value));
        } else if (seedFn) {
          setData(seedFn());
        }
      } catch (e) {
        if (seedFn) setData(seedFn());
      }
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        await window.storage.set(key, JSON.stringify(data), false);
      } catch (e) {
        console.error("save failed", e);
      }
    })();
  }, [data, loaded]);

  return [data, setData, loaded];
}

function parseCSV(text) {
  // Proper CSV parser handling quoted fields, embedded commas, and multi-line values
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;
  const clean = text.replace(/^\uFEFF/, ""); // strip BOM
  for (let i = 0; i < clean.length; i++) {
    const c = clean[i];
    const next = clean[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\r") { /* skip */ }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).filter(r => r.some(v => v && v.trim())).map(r => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (r[i] ?? "").trim(); });
    return obj;
  });
}

function normalizeImportedRow(raw) {
  const get = (...keys) => {
    for (const k of keys) {
      const found = Object.keys(raw).find(rk => rk.toLowerCase().trim() === k.toLowerCase());
      if (found && raw[found] && raw[found] !== "—") return raw[found];
    }
    return "";
  };
  const clean = (v) => (v === "—" ? "" : v);
  const rawStatus = get("Status", "status").toLowerCase().trim();
  const rawSource = clean(get("Source", "source"));
  const rawFinder = clean(get("Assigned", "finder", "Kisne lead dhoondi"));

  return {
    ...emptyLead(),
    name: clean(get("Name", "name")) || "Unnamed Lead",
    company: clean(get("Company", "company")),
    phone: clean(get("Phone", "phone")),
    email: clean(get("Email", "email")),
    source: SOURCES.includes(rawSource) ? rawSource : (SOURCES.find(s => s.toLowerCase() === rawSource.toLowerCase()) || SOURCES[0]),
    finder: FINDERS.includes(rawFinder) ? rawFinder : (FINDERS.find(f => f.toLowerCase() === rawFinder.toLowerCase()) || FINDERS[0]),
    status: STATUS_ALIASES[rawStatus] || "followup1",
    dealValue: clean(get("Deal Value", "dealValue")) || "",
    notes: clean(get("Notes", "notes")),
    nextFollowup: clean(get("Follow-up Date", "nextFollowup", "Next Followup Date")),
    createdAt: clean(get("Created", "createdAt")) || todayStr(),
    updatedAt: todayStr(),
  };
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date(todayStr());
  const target = new Date(dateStr);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
}

    return leads.filter(l => {
      const q = query.trim().toLowerCase();
      const matchesQ = !q || l.name.toLowerCase().includes(q) || l.company.toLowerCase().includes(q) || l.phone.toLowerCase().includes(q) || l.email.toLowerCase().includes(q);
      const matchesSource = !filterSource || l.source === filterSource;
      const matchesFinder = !filterFinder || l.finder === filterFinder;
      const matchesStatus = !filterStatus || l.status === filterStatus;
      return matchesQ && matchesSource && matchesFinder && matchesStatus;
    });
  }, [leads, query, filterSource, filterFinder, filterStatus]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const paginated = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

  const byStatus = (key) => filtered.filter(l => l.status === key);

  const stats = useMemo(() => {
    const won = leads.filter(l => l.status === "won").length;
    const active = leads.filter(l => !["won", "notresponding"].includes(l.status)).length;
    const totalValue = leads.filter(l => l.status === "won").reduce((sum, l) => sum + (parseFloat(l.dealValue) || 0), 0);
    return { total: leads.length, won, active, totalValue };
  }, [leads]);

  const followupLeads = useMemo(() => {
    return leads.filter(l => l.nextFollowup).map(l => ({ ...l, daysLeft: daysUntil(l.nextFollowup) })).sort((a, b) => a.daysLeft - b.daysLeft);
  }, [leads]);

  const dueTodayOrOverdueCount = useMemo(() => followupLeads.filter(l => l.daysLeft <= 0).length, [followupLeads]);
  const pendingTasksCount = useMemo(() => tasks.filter(t => !t.done).length, [tasks]);
  const notificationsCount = dueTodayOrOverdueCount + tasks.filter(t => !t.done && t.dueDate && daysUntil(t.dueDate) <= 0).length;

  const analytics = useMemo(() => {
    const byStatusData = STATUSES.map(s => ({ name: s.label, value: leads.filter(l => l.status === s.key).length, color: s.color }));
    const bySourceData = SOURCES.map(s => ({ name: s, value: leads.filter(l => l.source === s).length }));
    const byFinderData = FINDERS.map(f => ({ name: f, leads: leads.filter(l => l.finder === f).length, won: leads.filter(l => l.finder === f && l.status === "won").length }));
    const winRate = leads.length ? Math.round((stats.won / leads.length) * 100) : 0;
    // last 6 months trend
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setMonth(d.getMonth() - i);
      months.push({ key: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`, label: d.toLocaleString("default", { month: "short" }) });

      name: m.label,
      leads: leads.filter(l => (l.createdAt || "").startsWith(m.key)).length,
      won: leads.filter(l => (l.updatedAt || "").startsWith(m.key) && l.status === "won").length,
    }));
    return { byStatusData, bySourceData, byFinderData, winRate, trend };
  }, [leads, stats]);

  const exportCSV = () => {

    const rows = leads.map(l => headers.map(h => `"${String(l[h] ?? "").replace(/"/g, '""')}"`).join(","));
    const csv = [headers.join(","), ...rows].join("\r\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `growthify-crm-${todayStr()}.csv`; a.click();
    URL.revokeObjectURL(url); showToast("Exported CSV ⬇️");
  };
  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const text = evt.target.result;
        let withIds = [];
        if (file.name.endsWith(".json")) {
          const imported = JSON.parse(text);
          withIds = imported.map(l => ({ ...emptyLead(), ...l, id: l.id || uid() }));
        } else {
          const rows = parseCSV(text);
          withIds = rows.map(r => ({ ...normalizeImportedRow(r), id: uid() }));
        }
        setLeads(prev => [...withIds, ...prev]);
        showToast(`Imported ${withIds.length} leads ✅`);

            </div>
            <div className="flex gap-3">
              <button onClick={exportCSV} className="flex items-center gap-1.5 bg-white border-2 border-slate-200 hover:border-indigo-300 text-slate-700 font-semibold text-sm px-4 py-2.5 rounded-xl"><Download size={15} /> Export Full CSV</button>
              <button onClick={exportJSON} className="flex items-center gap-1.5 bg-white border-2 border-slate-200 hover:border-indigo-300 text-slate-700 font-semibold text-sm px-4 py-2.5 rounded-xl"><Download size={15} /> Export Full JSON</button>
            </div>
          </div>
        )}

        {/* TASKS */}
        {screen === "tasks" && (
          <div>
            <div className="flex items-center justify-between mb-5">
              <div><h1 className="text-2xl font-extrabold text-slate-800">Tasks</h1><p className="text-slate-500 text-sm">{pendingTasksCount} pending</p></div>
              <button onClick={() => setModalTask(emptyTask())} className="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm px-4 py-2 rounded-xl shadow-md shadow-indigo-200"><Plus size={16} /> Add Task</button>
            </div>
            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-2">
              {tasks.length === 0 && <div className="text-center text-slate-300 py-16">Koi task nahi hai, "Add Task" se shuru karo</div>}
              <div className="divide-y divide-slate-50">
                {tasks.map(t => {
                  const linkedLead = leads.find(l => l.id === t.leadId);
                  const dLeft = t.dueDate ? daysUntil(t.dueDate) : null;
                  return (
                    <div key={t.id} className="flex items-center gap-3 px-3 py-3.5 hover:bg-slate-50 rounded-xl group">
                      <button onClick={() => toggleTask(t.id)}>
                        {t.done ? <CheckSquare size={20} className="text-emerald-500" /> : <Square size={20} className="text-slate-300" />}
                      </button>
                      <div className="flex-1 min-w-0 cursor-pointer" onClick={() => setModalTask(t)}>
                        <div className={`font-semibold text-sm ${t.done ? "line-through text-slate-400" : "text-slate-800"}`}>{t.title}</div>
                        {linkedLead && <div className="text-xs text-slate-400">Lead: {linkedLead.name}</div>}
                      </div>
                      {t.dueDate && (
                        <span className={`text-xs font-bold ${!t.done && dLeft <= 0 ? "text-red-500" : "text-slate-400"}`}>{t.dueDate}</span>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* NOTIFICATIONS */}
        {screen === "notifications" && (
          <div>
            <h1 className="text-2xl font-extrabold text-slate-800 mb-1">Notifications</h1>
            <p className="text-slate-500 text-sm mb-5">Due followups aur tasks ek jagah</p>
            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-2">
              <div className="divide-y divide-slate-50">
                {followupLeads.filter(l => l.daysLeft <= 2).map(l => (
                  <div key={"f" + l.id} onClick={() => setModalLead(l)} className="flex items-center gap-3 px-3 py-3.5 hover:bg-slate-50 cursor-pointer rounded-xl">
                    <span className="w-9 h-9 rounded-full bg-red-50 flex items-center justify-center shrink-0"><Bell size={16} className="text-red-500" /></span>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-sm text-slate-800">Followup: {l.name}</div>
                      <div className="text-xs text-slate-400">{l.daysLeft <= 0 ? "Due ho chuka hai" : `${l.daysLeft} din mein due`}</div>
                    </div>
                    <span className="text-xs font-bold text-red-500">{l.nextFollowup}</span>
                  </div>
                ))}
                {tasks.filter(t => !t.done && t.dueDate && daysUntil(t.dueDate) <= 2).map(t => (
                  <div key={"t" + t.id} onClick={() => setModalTask(t)} className="flex items-center gap-3 px-3 py-3.5 hover:bg-slate-50 cursor-pointer rounded-xl">
                    <span className="w-9 h-9 rounded-full bg-amber-50 flex items-center justify-center shrink-0"><CheckSquare size={16} className="text-amber-500" /></span>
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold text-sm text-slate-800">Task: {t.title}</div>
                      <div className="text-xs text-slate-400">{daysUntil(t.dueDate) <= 0 ? "Due ho chuka hai" : `${daysUntil(t.dueDate)} din mein due`}</div>
                    </div>
                    <span className="text-xs font-bold text-amber-500">{t.dueDate}</span>
                  </div>
                ))}
                {notificationsCount === 0 && <div className="text-center text-slate-300 py-16">Koi notification nahi — sab clear hai! 🎉</div>}
              </div>
            </div>
          </div>
        )}
      </div>

      {modalLead && <LeadModal lead={modalLead} onClose={() => setModalLead(null)} onSave={saveLead} onDelete={deleteLead} />}
      {modalTask && <TaskModal task={modalTask} leads={leads} onClose={() => setModalTask(null)} onSave={saveTask} onDelete={deleteTask} />}
      {toast && <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-sm font-semibold px-5 py-3 rounded-xl shadow-xl z-50">{toast}</div>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GrowthifyCRM />);
</script>
</body>
</html>
